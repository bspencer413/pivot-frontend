const toTitleCase = (str) => {
  if (!str) return '';
  return str.toLowerCase().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
};

const smartTitleCase = (str) => {
  if (!str) return '';
  return toTitleCase(str.trim());
};

// Hazard type → emoji icon. Kept compact for the drawer cards.
const hazardIcon = (type) => {
  if (type === 'earthquake') return '🌐';
  if (type === 'severe_weather' || type === 'storm') return '⛈️';
  if (type === 'tornado') return '🌪️';
  if (type === 'hurricane' || type === 'tropical_cyclone') return '🌀';
  if (type === 'wildfire' || type === 'fire') return '🔥';
  if (type === 'volcano') return '🌋';
  if (type === 'flood') return '💧';
  if (type === 'tsunami') return '🌊';
  if (type === 'winter_storm' || type === 'ice') return '❄️';
  return '⚠️';
};

// Severity → color + label. Maps the four-bucket severity from the backend
// (minor / moderate / severe / extreme) to amber-stack styling.
const severityStyle = (sev) => {
  if (sev === 'extreme') return { border: '#dc2626', headerBg: '#991b1b', cardBg: 'rgba(127,29,29,0.45)', label: 'Extreme' };
  if (sev === 'severe')  return { border: '#ea580c', headerBg: '#9a3412', cardBg: 'rgba(124,45,18,0.45)', label: 'Severe' };
  if (sev === 'moderate')return { border: '#d97706', headerBg: '#92400e', cardBg: 'rgba(120,53,15,0.45)', label: 'Moderate' };
  return { border: '#a16207', headerBg: '#713f12', cardBg: 'rgba(113,63,18,0.35)', label: 'Minor' };
};

const formatDistance = (mi) => {
  if (mi == null) return '';
  if (mi < 1) return '< 1 mi';
  if (mi < 10) return mi.toFixed(1) + ' mi';
  return Math.round(mi) + ' mi';
};

const formatRelativeTime = (iso) => {
  if (!iso) return '';
  try {
    const t = new Date(iso.replace(' ', 'T') + (iso.indexOf('Z') === -1 && iso.indexOf('+') === -1 ? 'Z' : ''));
    const diffMs = Date.now() - t.getTime();
    const min = Math.floor(diffMs / 60000);
    if (min < 1) return 'just now';
    if (min < 60) return min + ' min ago';
    const hrs = Math.floor(min / 60);
    if (hrs < 24) return hrs + ' hr ago';
    const days = Math.floor(hrs / 24);
    if (days < 30) return days + ' day' + (days === 1 ? '' : 's') + ' ago';
    return t.toLocaleDateString();
  } catch (e) { return ''; }
};

// ============================================================================
// AuthGate v0.3.3 — 3Brains portable account + anonymous-storage component
// ============================================================================
//
// PURPOSE
// Drop-in component for any 3Brains app. Handles:
//   1. Anonymous users save up to freeAnonLimit items to localStorage
//   2. At the cap, the signup modal opens automatically
//   3. On signup, localStorage items migrate to the server
//   4. Returning users sign in via the same modal
//
// INSTALL IN A NEW 3BRAINS APP
//   (a) Paste this entire block into the host index.html immediately AFTER
//       the SKIN BLOCK constants (so API_BASE is already declared).
//   (b) Adjust AUTH_GATE_CONFIG below for the host app:
//         - apiBase, tokenKey, userKey, anonStorageKey, anonSnapshotPrefix
//         - appName, saveActionLabel, itemNoun, upgradeBenefit
//         - accentColor (CSS var reference for the host app)
//   (c) Inside the App() component, at the very top, add:
//         const gate = useAuthGate(AUTH_GATE_CONFIG);
//   (d) Use the gate interface throughout App:
//         - gate.isAuthed (boolean)
//         - gate.user (object or null)
//         - gate.list (saved items array, anon localStorage or server)
//         - gate.add(item) — routes anon vs server, enforces cap
//         - gate.remove(id) — routes anon vs server
//         - gate.requireAuth(callback) — gate any action behind sign-in
//         - gate.openSignup() / gate.openSignin() — open the modal manually
//         - gate.signOut() — clear token + user, list flips to anon
//   (e) Render once at the root of the App return:
//         {gate.modal}                  // v0.3.1: JSX, not a component
//   (f) Render <gate.CounterBanner /> on save-list pages (anon-only display)
//   (g) Render <gate.EmptyState message="..." /> on auth-gated tabs
//
// BACKEND REQUIREMENTS (already met by all 3Brains backends)
//   POST {registerEndpoint} {email, password} -> {access_token, token_type}
//   POST {loginEndpoint} {email, password} -> {access_token, token_type}
//   GET {watchlistEndpoint} -> [{id, name, location, ...}, ...]
//   POST {watchlistEndpoint} {name, location} -> {id, name, location}
//   DELETE {watchlistEndpoint}/{id} -> any 2xx
//
// MIGRATION FROM PASSWORD TO MAGIC-LINK (Phase 2 / Step B)
//   Swap the body of submitModal() to call the magic-link request endpoint
//   and replace the password input with a single email field. The public
//   surface (gate.add, gate.requireAuth, etc.) does not change — host apps
//   keep working without modification.
//
// CONSTRAINTS (matches all 3Brains apps)
//   - No JS spread operators (iOS Safari friction). Uses Object.assign / concat.
//   - No Tailwind JIT arbitrary classes. All styling is inline-style objects.
//   - React 18 via CDN + Babel. No build toolchain.
//   - Dark theme assumed. Colors configurable via accentColor + modalBg.
// ============================================================================

// --- PER-APP CONFIG ---------------------------------------------------------
// Adjust these values when installing in a new 3Brains app.
const AUTH_GATE_CONFIG = {
  apiBase: API_BASE,
  tokenKey: 'ew_token',
  userKey: 'ew_user',
  anonStorageKey: 'ew_anon_places',
  anonSnapshotPrefix: 'ew_place_',
  watchlistEndpoint: '/ew/places',
  loginEndpoint: '/auth/login',
  registerEndpoint: '/auth/register',
  freeAnonLimit: 5,
  appName: 'EarthWatch',
  saveActionLabel: 'save this place',
  itemNoun: 'places',
  upgradeBenefit: 'unlimited saves and 12-hour earth alerts',
  accentColor: '#14b8a6',
  modalBg: 'rgba(8,20,30,0.80)',
  modalBackdropImage: EW_LOGIN_BG,
  stayLoggedInDefault: true
};

// --- HOOK -------------------------------------------------------------------
function useAuthGate(config) {
  const [isAuthed, setIsAuthed] = useState(false);
  const [user, setUser] = useState(null);
  const [list, setList] = useState([]);
  const [listLoading, setListLoading] = useState(false);
  const [modalOpen, setModalOpen] = useState(false);
  const [modalMode, setModalMode] = useState('signup'); // 'signup' | 'signin'
  const [modalMessage, setModalMessage] = useState(null);
  const [modalEmail, setModalEmail] = useState('');
  const [modalPassword, setModalPassword] = useState('');
  const [modalShowPwd, setModalShowPwd] = useState(false);
  const [modalLoading, setModalLoading] = useState(false);
  const [modalError, setModalError] = useState(null);
  const [pendingAction, setPendingAction] = useState(null);
  const [backendWaking, setBackendWaking] = useState(false);
  // v0.3.1: persistence toggle. true = localStorage (survives browser close).
  // false = sessionStorage (cleared on browser/tab close).
  const [stayLoggedIn, setStayLoggedIn] = useState(
    config.stayLoggedInDefault !== false
  );

  // -- localStorage helpers
  const readAnonList = () => {
    try {
      const raw = localStorage.getItem(config.anonStorageKey);
      return raw ? JSON.parse(raw) : [];
    } catch (e) { return []; }
  };
  const writeAnonList = (items) => {
    try { localStorage.setItem(config.anonStorageKey, JSON.stringify(items)); }
    catch (e) { console.error('AuthGate: failed to write anon list', e); }
  };
  const genAnonId = () => 'anon_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);

  // -- v0.3.1 Storage helpers: route between localStorage (persistent) and
  //    sessionStorage (cleared on browser close), based on stayLoggedIn.
  const readToken = () => {
    return localStorage.getItem(config.tokenKey) || sessionStorage.getItem(config.tokenKey);
  };
  const readUserRaw = () => {
    return localStorage.getItem(config.userKey) || sessionStorage.getItem(config.userKey);
  };
  const writeAuth = (token, userJson, persistent) => {
    localStorage.removeItem(config.tokenKey);
    localStorage.removeItem(config.userKey);
    sessionStorage.removeItem(config.tokenKey);
    sessionStorage.removeItem(config.userKey);
    const store = persistent ? localStorage : sessionStorage;
    store.setItem(config.tokenKey, token);
    store.setItem(config.userKey, userJson);
  };
  const clearAuth = () => {
    localStorage.removeItem(config.tokenKey);
    localStorage.removeItem(config.userKey);
    sessionStorage.removeItem(config.tokenKey);
    sessionStorage.removeItem(config.userKey);
  };

  // -- Server fetch helpers
  const serverGet = async () => {
    const t = readToken();
    const r = await fetch(config.apiBase + config.watchlistEndpoint, {
      headers: { 'Authorization': 'Bearer ' + t }
    });
    if (!r.ok) throw new Error('Failed to load list');
    return await r.json();
  };
  const serverAdd = async (item) => {
    // v0.3.1: pass item shape through unchanged. Host app controls payload.
    const t = readToken();
    const r = await fetch(config.apiBase + config.watchlistEndpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + t },
      body: JSON.stringify(item)
    });
    if (!r.ok) throw new Error('Failed to save');
    return await r.json();
  };
  const serverRemove = async (id) => {
    const t = readToken();
    const r = await fetch(config.apiBase + config.watchlistEndpoint + '/' + id, {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + t }
    });
    if (!r.ok) throw new Error('Failed to remove');
    return true;
  };

  // -- Refresh the public list (anon localStorage or server, depending on auth)
  const refreshList = async () => {
    setListLoading(true);
    try {
      if (isAuthed) setList(await serverGet());
      else setList(readAnonList());
    } catch (e) {
      console.error('AuthGate refreshList:', e);
      setList([]);
    } finally {
      setListLoading(false);
    }
  };

  // -- Mount: hydrate token + user from either storage (v0.3.1)
  useEffect(() => {
    const t = readToken();
    const u = readUserRaw();
    if (t && u) {
      try { setUser(JSON.parse(u)); setIsAuthed(true); }
      catch (e) { clearAuth(); }
    }
  // eslint-disable-next-line
  }, []);

  // -- Reload list whenever auth flips. Also self-heal: if signed in and any
  //    anon items remain in localStorage (e.g. from a failed migration), retry.
  useEffect(() => {
    refreshList();
    if (isAuthed) {
      const anon = readAnonList();
      if (anon && anon.length > 0) {
        migrateAnonToServer(anon);
      }
    }
  // eslint-disable-next-line
  }, [isAuthed]);

  // -- Anon -> server migration (called on signup, also self-heal on mount)
  //    Atomic per-item: each anon item is POSTed individually, removed from
  //    anon list on success. Partial failure leaves remaining items in anon
  //    storage for a future retry. Snapshot keys are remapped from temp anon
  //    IDs to server IDs as part of the migration.
  const migrateAnonToServer = async (anonItems) => {
    let remaining = anonItems.slice();
    let migrated = 0;
    for (let i = 0; i < anonItems.length; i++) {
      const anonItem = anonItems[i];
      try {
        // v0.3.2: shape-agnostic migration. POST the full anon item minus the
        // client-only id (backend assigns its own). No field cherry-picking.
        const payload = Object.assign({}, anonItem);
        delete payload.id;
        const created = await serverAdd(payload);
        // Remap snapshot key if it exists under the temp anon ID
        try {
          const oldKey = config.anonSnapshotPrefix + anonItem.id;
          const oldSnap = localStorage.getItem(oldKey);
          if (oldSnap) {
            localStorage.setItem(config.anonSnapshotPrefix + created.id, oldSnap);
            localStorage.removeItem(oldKey);
          }
        } catch (e) {}
        remaining = remaining.filter(it => it.id !== anonItem.id);
        writeAnonList(remaining);
        migrated++;
      } catch (e) {
        console.error('AuthGate: migration failed for item', anonItem.id, e);
        break; // leave remaining for retry
      }
    }
    if (remaining.length === 0) {
      try { localStorage.removeItem(config.anonStorageKey); } catch (e) {}
    }
    await refreshList();
    return migrated;
  };

  // -- Modal openers/closer
  const openSignup = (msg) => {
    setModalMode('signup');
    setModalMessage(msg || null);
    setModalEmail(''); setModalPassword('');
    setModalError(null);
    setModalOpen(true);
  };
  const openSignin = (msg) => {
    setModalMode('signin');
    setModalMessage(msg || null);
    setModalEmail(''); setModalPassword('');
    setModalError(null);
    setModalOpen(true);
  };
  const closeModal = () => {
    setModalOpen(false);
    setModalEmail(''); setModalPassword('');
    setModalMessage(null); setModalError(null);
    setPendingAction(null);
  };

  const signOut = () => {
    clearAuth();
    setUser(null);
    setIsAuthed(false);
    // The isAuthed-watching useEffect will reload the list from anon storage
  };

  // -- Public: add an item. Routes anon vs server, enforces anon cap.
  //    Returns the created item ({id, name, location, ...}) on success.
  //    Returns null when the anon cap is hit (AuthGate opens the modal and
  //    queues the action to replay after signup).
  const add = async (item) => {
    if (isAuthed) {
      const created = await serverAdd(item);
      await refreshList();
      return created;
    }
    const current = readAnonList();
    if (current.length >= config.freeAnonLimit) {
      openSignup('You\'ve saved ' + config.freeAnonLimit + ' ' + config.itemNoun
        + '. Sign up for ' + config.upgradeBenefit + '.');
      setPendingAction({ type: 'add', item: item });
      return null;
    }
    const id = genAnonId();
    // v0.3.2: shape-agnostic. Safe defaults first, host item on top (host
    // fields win), then stamp client id + created_at. Preserves whatever
    // shape the host passes to gate.add (Earth uses lat/lng/radius_mi/alert_level,
    // not location). No spread (iOS Safari).
    const defaults = { status: 'active', is_resolved: false, resolution_outcome: null };
    const newItem = Object.assign({}, defaults, item, {
      id: id,
      created_at: new Date().toISOString()
    });
    const updated = current.concat([newItem]);
    writeAnonList(updated);
    setList(updated);
    return newItem;
  };

  // -- Public: remove an item by id (anon or server)
  const remove = async (id) => {
    if (isAuthed) {
      await serverRemove(id);
    } else {
      const current = readAnonList();
      const updated = current.filter(it => it.id !== id);
      writeAnonList(updated);
      try { localStorage.removeItem(config.anonSnapshotPrefix + id); } catch (e) {}
    }
    await refreshList();
  };

  // -- Public: gate an arbitrary action behind sign-in. Runs callback
  //    immediately if authed; otherwise opens the modal and replays the
  //    callback after successful sign-in / sign-up.
  const requireAuth = (callback) => {
    if (isAuthed) { callback(); return true; }
    setPendingAction({ type: 'callback', fn: callback });
    openSignup('Sign up to ' + config.saveActionLabel + '.');
    return false;
  };

  // -- Modal submit (calls login or register against backend)
  const submitModal = async () => {
    if (!modalEmail || !modalPassword) {
      setModalError('Email and password required.');
      return;
    }
    setModalLoading(true);
    setModalError(null);
    setBackendWaking(false);
    const wakeTimer = setTimeout(() => setBackendWaking(true), 3000);
    try {
      const endpoint = modalMode === 'signup' ? config.registerEndpoint : config.loginEndpoint;
      const r = await fetch(config.apiBase + endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: modalEmail, password: modalPassword })
      });
      clearTimeout(wakeTimer); setBackendWaking(false);
      if (!r.ok) {
        const errBody = await r.json().catch(() => ({}));
        throw new Error(errBody.detail || 'Auth failed');
      }
      const data = await r.json();
      const u = { email: modalEmail, name: modalEmail.split('@')[0] };
      writeAuth(data.access_token, JSON.stringify(u), stayLoggedIn);
      setUser(u);
      setIsAuthed(true);
      // The isAuthed effect handles refreshList + migration

      const pa = pendingAction;
      setPendingAction(null);
      setModalOpen(false);
      setModalEmail(''); setModalPassword('');
      setModalMessage(null);

      // Replay pending action after isAuthed has propagated. We re-do the
      // add through serverAdd directly (not gate.add) because the closure
      // captured the old isAuthed=false.
      // v0.3.3: after the replay, tell the host so it can move the user off the
      // stale search view onto their saved list. Without this, the item that
      // hit the cap is left on screen and re-tapping Save says "already saved".
      const notifyHost = () => {
        if (typeof config.onAuthSuccess === 'function') {
          try { config.onAuthSuccess({ hadPendingAdd: !!(pa && pa.type === 'add') }); }
          catch (e) {}
        }
      };
      if (pa) {
        setTimeout(async () => {
          try {
            if (pa.type === 'callback' && typeof pa.fn === 'function') {
              pa.fn();
            } else if (pa.type === 'add' && pa.item) {
              await serverAdd(pa.item);
              await refreshList();
            }
          } catch (e) { console.error('AuthGate: replay pending action failed', e); }
          notifyHost();
        }, 100);
      } else {
        notifyHost();
      }
    } catch (e) {
      clearTimeout(wakeTimer); setBackendWaking(false);
      setModalError(e.message || 'Auth failed.');
    } finally {
      setModalLoading(false);
    }
  };

  // -- Modal component
  // v0.3.1: Return modal as JSX (use as {gate.modal}). Defining as a closure-based
  // component caused remount-on-every-render, dropping keyboard focus on each keystroke.
  const isSignup = modalMode === 'signup';
  const modal = !modalOpen ? null : (
      <>
        <div onClick={closeModal} style={Object.assign(
          {
            position: 'fixed', top: 0, right: 0, bottom: 0, left: 0, zIndex: 999,
            backgroundColor: 'rgba(0,0,0,0.7)'
          },
          config.modalBackdropImage ? {
            backgroundImage: 'url(' + config.modalBackdropImage + ')',
            backgroundSize: 'cover',
            backgroundPosition: 'center',
            backgroundColor: 'rgba(0,0,0,0.35)'
          } : {}
        )} />
        <div style={{
          position: 'fixed', zIndex: 1000,
          left: '50%', top: '50%', transform: 'translate(-50%, -50%)',
          width: 'calc(100% - 2rem)', maxWidth: '420px',
          backgroundColor: config.modalBg,
          borderRadius: '20px',
          border: '1px solid rgba(255,255,255,0.15)',
          padding: '1.5rem',
          backdropFilter: 'blur(8px)',
          boxShadow: '0 10px 40px rgba(0,0,0,0.6)'
        }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '0.5rem' }}>
            <h2 style={{ color: '#fff', fontSize: '1.75rem', fontWeight: 700, margin: 0, lineHeight: 1.1 }}>
              {isSignup ? 'Sign up' : 'Sign in'}
            </h2>
            <button onClick={closeModal} type="button" style={{
              background: 'transparent', border: 'none', color: 'rgba(255,255,255,0.6)',
              fontSize: '1.75rem', fontWeight: 700, cursor: 'pointer', lineHeight: 1, padding: '0 0.25rem'
            }}>X</button>
          </div>
          {/* v0.3.1: Always-shown value-prop subhead. Tells the user *why*. */}
          {isSignup && (
            <p style={{ color: 'rgba(255,255,255,0.80)', fontSize: '1rem', lineHeight: 1.4, marginBottom: '0.75rem' }}>
              Sign up for {config.upgradeBenefit}.
            </p>
          )}
          {modalMessage && (
            <p style={{ color: 'rgba(255,255,255,0.85)', fontSize: '1.125rem', lineHeight: 1.4, marginBottom: '1rem' }}>
              {modalMessage}
            </p>
          )}
          <input type="email" placeholder="Email address" value={modalEmail}
            onChange={(e) => setModalEmail(e.target.value)}
            onKeyPress={(e) => e.key === 'Enter' && submitModal()}
            autoComplete="email"
            style={{
              width: '100%', padding: '0.75rem 1rem', borderRadius: '12px',
              backgroundColor: 'rgba(255,255,255,0.1)', border: '1px solid rgba(255,255,255,0.3)',
              color: '#fff', fontSize: '1.125rem', marginBottom: '0.75rem',
              boxSizing: 'border-box', outline: 'none'
            }} />
          <div style={{ position: 'relative', marginBottom: '0.75rem' }}>
            <input type={modalShowPwd ? 'text' : 'password'} placeholder="Password"
              value={modalPassword}
              onChange={(e) => setModalPassword(e.target.value)}
              onKeyPress={(e) => e.key === 'Enter' && submitModal()}
              autoComplete={isSignup ? 'new-password' : 'current-password'}
              style={{
                width: '100%', padding: '0.75rem 3rem 0.75rem 1rem', borderRadius: '12px',
                backgroundColor: 'rgba(255,255,255,0.1)', border: '1px solid rgba(255,255,255,0.3)',
                color: '#fff', fontSize: '1.125rem', boxSizing: 'border-box', outline: 'none'
              }} />
            <button onClick={() => setModalShowPwd(!modalShowPwd)} type="button"
              style={{
                position: 'absolute', right: '0.75rem', top: '50%', transform: 'translateY(-50%)',
                background: 'transparent', border: 'none', color: 'rgba(255,255,255,0.6)',
                cursor: 'pointer', fontSize: '0.875rem', padding: '0.25rem'
              }}>{modalShowPwd ? 'hide' : 'show'}</button>
          </div>
          {backendWaking && (
            <p style={{ color: 'rgba(255,255,255,0.6)', fontSize: '1rem', textAlign: 'center', marginBottom: '0.75rem' }}>
              Waking up the server...
            </p>
          )}
          {modalError && (
            <p style={{ color: '#f87171', fontSize: '1rem', textAlign: 'center', marginBottom: '0.75rem' }}>
              {modalError}
            </p>
          )}
          {/* v0.3.1: Stay-signed-in toggle. Default ON. Off = sessionStorage = sign-out on browser close. */}
          <label style={{
            display: 'flex', alignItems: 'center', gap: '0.5rem',
            color: 'rgba(255,255,255,0.85)', fontSize: '1rem',
            marginBottom: '0.75rem', cursor: 'pointer'
          }}>
            <input type="checkbox" checked={stayLoggedIn}
              onChange={(e) => setStayLoggedIn(e.target.checked)}
              style={{ width: '1.1rem', height: '1.1rem', cursor: 'pointer' }} />
            Stay signed in on this device
          </label>
          <button onClick={submitModal} disabled={modalLoading} type="button"
            style={{
              width: '100%', padding: '1rem', borderRadius: '12px',
              backgroundColor: config.accentColor, color: '#fff', fontSize: '1.25rem',
              fontWeight: 700, border: 'none', cursor: 'pointer',
              opacity: modalLoading ? 0.5 : 1, marginBottom: '0.75rem'
            }}>
            {modalLoading ? '...' : (isSignup ? 'Sign up' : 'Sign in')}
          </button>
          <p style={{ color: 'rgba(255,255,255,0.7)', fontSize: '1rem', textAlign: 'center', margin: 0 }}>
            {isSignup ? 'Already have an account? ' : 'New here? '}
            <button onClick={() => { setModalMode(isSignup ? 'signin' : 'signup'); setModalError(null); }} type="button"
              style={{
                background: 'transparent', border: 'none', color: config.accentColor,
                fontSize: '1rem', fontWeight: 700, cursor: 'pointer', padding: 0,
                textDecoration: 'underline'
              }}>
              {isSignup ? 'Sign in' : 'Sign up'}
            </button>
          </p>
        </div>
      </>
    );

  // -- Empty-state for auth-gated tabs (e.g. Alerts when anon)
  const EmptyState = ({ message, ctaLabel }) => (
    <div style={{ padding: '2rem 1rem', textAlign: 'center' }}>
      <p style={{ color: 'rgba(255,255,255,0.85)', fontSize: '1.25rem', lineHeight: 1.5, marginBottom: '1.25rem' }}>
        {message}
      </p>
      <button onClick={() => openSignup()} type="button"
        style={{
          padding: '0.875rem 1.75rem', borderRadius: '12px',
          backgroundColor: config.accentColor, color: '#fff',
          fontSize: '1.125rem', fontWeight: 700, border: 'none', cursor: 'pointer'
        }}>
        {ctaLabel || 'Sign up'}
      </button>
    </div>
  );

  // -- Counter banner for save-list pages (anon-only display)
  const CounterBanner = () => {
    if (isAuthed) return null;
    const count = list.length;
    if (count === 0) return null;
    return (
      <div style={{
        padding: '0.625rem 0.875rem', backgroundColor: 'rgba(0,0,0,0.4)',
        border: '1px solid rgba(255,255,255,0.15)', borderRadius: '12px',
        marginBottom: '0.75rem', display: 'flex', justifyContent: 'space-between',
        alignItems: 'center', gap: '0.5rem', flexWrap: 'wrap'
      }}>
        <span style={{ color: 'rgba(255,255,255,0.85)', fontSize: '1rem' }}>
          {count} of {config.freeAnonLimit} saves used
        </span>
        <button onClick={() => openSignup()} type="button"
          style={{
            padding: '0.4rem 0.9rem', borderRadius: '999px',
            backgroundColor: config.accentColor, color: '#fff',
            fontSize: '0.875rem', fontWeight: 700, border: 'none', cursor: 'pointer'
          }}>
          Sign up for unlimited
        </button>
      </div>
    );
  };

  const atLimit = !isAuthed && list.length >= config.freeAnonLimit;

  return {
    isAuthed: isAuthed,
    user: user,
    list: list,
    listLoading: listLoading,
    count: list.length,
    atLimit: atLimit,
    add: add,
    remove: remove,
    refreshList: refreshList,
    getToken: readToken,               // v0.3.2: host token reads route here (dual-storage safe)
    requireAuth: requireAuth,
    openSignup: openSignup,
    openSignin: openSignin,
    signOut: signOut,
    modal: modal,                            // v0.3.1: JSX (host renders {gate.modal}). Stable, preserves focus.
    EmptyState: EmptyState,
    CounterBanner: CounterBanner
  };
}

// === END AuthGate v0.3.3 ======================================================


function App() {
  const gate = useAuthGate(Object.assign({}, AUTH_GATE_CONFIG, {
    // v0.3.3: after a capped-save signup, land the user on their watchlist.
    onAuthSuccess: function (ctx) {
      if (ctx && ctx.hadPendingAdd) { setPage('watchlist'); }
    }
  }));
  // Compatibility shims -- read-only access for the rest of App().
  const auth = gate.isAuthed;
  const user = gate.user;
  const places = gate.list;
  const [page, setPage] = useState('search');
  const [notifications, setNotifications] = useState([]);
  const [expandedAlertGroups, setExpandedAlertGroups] = useState({});
  const [loading, setLoading] = useState(false);
  const [backendWaking, setBackendWaking] = useState(false);
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [showPassword, setShowPassword] = useState(false);
  const [newPlace, setNewPlace] = useState({ name: '', lat: '', lng: '', radius: 100 });
  const [geoQuery, setGeoQuery] = useState('');
  const [geoCandidates, setGeoCandidates] = useState([]);
  const [geoPicked, setGeoPicked] = useState(null);
  const [geoSearching, setGeoSearching] = useState(false);
  const [geoMsg, setGeoMsg] = useState('');
  const [editingId, setEditingId] = useState(null);
  const [editingName, setEditingName] = useState('');
  const [showDangerZone, setShowDangerZone] = useState(false);
  const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);
  const [drawerData, setDrawerData] = useState(null);
  const [drawerLoading, setDrawerLoading] = useState(false);
  const [mapEnlarged, setMapEnlarged] = useState(false);
  const [apiVersion, setApiVersion] = useState('...');
  const [addPlaceMsg, setAddPlaceMsg] = useState('');

  // Viewport sizing
  const [viewportW, setViewportW] = useState(typeof window !== 'undefined' ? window.innerWidth : 400);
  useEffect(() => {
    const onResize = () => setViewportW(window.innerWidth);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);
  const isPhone = viewportW < 640;
  const isTablet = viewportW >= 640 && viewportW < 1024;

  useEffect(() => {
    fetch(API_BASE + '/health').then(r => r.json()).then(d => setApiVersion(d.version || '?')).catch(() => setApiVersion('?'));
    // Auth hydration + places load are owned by useAuthGate now.
    const handleVisibilityChange = () => {
      if (document.visibilityState === 'visible') {
        setTimeout(() => { document.querySelectorAll('input').forEach(i => i.blur()); }, 100);
      }
    };
    document.addEventListener('visibilitychange', handleVisibilityChange);
    return () => document.removeEventListener('visibilitychange', handleVisibilityChange);
  }, []);

  // Reload notifications when sign-in flips. Anon users have no server alerts.
  useEffect(() => {
    if (gate.isAuthed) loadNotifications();
    else setNotifications([]);
    // eslint-disable-next-line
  }, [gate.isAuthed]);

  // Backwards-compat alias -- places loading is owned by AuthGate.
  const loadPlaces = () => gate.refreshList();

  const loadNotifications = async () => {
    try {
      const token = gate.getToken();
      const r = await fetch(API_BASE + '/notifications', { headers: { 'Authorization': 'Bearer ' + token } });
      if (!r.ok) throw new Error('Failed');
      setNotifications(await r.json());
    } catch (e) { console.error(e); }
  };

  const dismissAlert = async (notifId) => {
    const token = gate.getToken();
    setNotifications(prev => prev.filter(n => n.id !== notifId));
    try { await fetch(API_BASE + '/notifications/' + notifId, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } }); } catch(e) {}
  };

  // doAuth removed -- AuthGate owns register/login.

  const doLogout = () => {
    gate.signOut();
    setPage('search');
  };

  const doDeleteAccount = async () => {
    const token = gate.getToken();
    try {
      await fetch(API_BASE + '/account', { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
    } catch(e) {}
    doLogout();
  };

  const doGeocode = async () => {
    setGeoMsg('');
    setGeoCandidates([]);
    setGeoPicked(null);
    var q = (geoQuery || '').trim();
    if (q.length < 2) { setGeoMsg('Type a city, address, or landmark.'); return; }
    setGeoSearching(true);
    try {
      var token = gate.getToken();
      var r = await fetch(API_BASE + '/ew/geocode', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ query: q })
      });
      if (!r.ok) {
        var err = await r.json().catch(function(){ return {}; });
        setGeoMsg(err.detail || 'Search failed. Try a different query.');
        setGeoSearching(false);
        return;
      }
      var data = await r.json();
      var cands = data.candidates || [];
      setGeoCandidates(cands);
      if (cands.length === 0) setGeoMsg('No matches. Try a more specific query.');
    } catch (e) {
      setGeoMsg('Network error: ' + e.message);
    }
    setGeoSearching(false);
  };

  const addPlace = async () => {
    setAddPlaceMsg('');
    var name = (newPlace.name || '').trim();
    var radius = parseFloat(newPlace.radius) || 100;
    var lat, lng;
    if (geoPicked) {
      lat = geoPicked.lat;
      lng = geoPicked.lng;
      if (!name) name = geoPicked.formatted_address.split(',')[0].trim();
    } else {
      lat = parseFloat(newPlace.lat);
      lng = parseFloat(newPlace.lng);
    }
    if (!name) { setAddPlaceMsg('Please enter a name for this place.'); return; }
    if (isNaN(lat) || lat < -90 || lat > 90) { setAddPlaceMsg('Search for a place first, or enter coordinates.'); return; }
    if (isNaN(lng) || lng < -180 || lng > 180) { setAddPlaceMsg('Search for a place first, or enter coordinates.'); return; }
    try {
      const created = await gate.add({ name: name, lat: lat, lng: lng, radius_mi: radius, alert_level: 'realtime' });
      if (!created) {
        // Hit the anon 5-cap -- AuthGate opened the signup modal.
        return;
      }
      setNewPlace({ name: '', lat: '', lng: '', radius: 100 });
      setGeoQuery('');
      setGeoCandidates([]);
      setGeoPicked(null);
      setAddPlaceMsg('Added "' + name + '" to your watchlist.');
      setTimeout(function(){ setAddPlaceMsg(''); setPage('watchlist'); }, 900);
    } catch (e) {
      setAddPlaceMsg('Network error: ' + e.message);
    }
  };

  const setPlaceInMyPlaces = async (id, saved) => {
    // v0.1.6: toggles the in_my_places flag. Never removes the place from
    // Watchlist — Watchlist contains ALL places and is the live monitor.
    var token = gate.getToken();
    try {
      var r = await fetch(API_BASE + '/ew/places/' + id, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ in_my_places: saved })
      });
      if (r.ok) await gate.refreshList();
    } catch(e) { console.error('save to my places failed:', e); }
  };

  const renamePlace = async (id, name) => {
    var token = gate.getToken();
    try {
      var r = await fetch(API_BASE + '/ew/places/' + id, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ name: name })
      });
      if (r.ok) await gate.refreshList();
    } catch(e) { console.error('rename failed:', e); }
  };

  const removePlace = async (id) => {
    try {
      await gate.remove(id);
    } catch(e) { console.error('delete failed:', e); }
  };

  const openPlaceDrawer = async (place) => {
    setDrawerData({ place: place, events: [], count: 0 });
    setDrawerLoading(true);
    const token = gate.getToken();
    try {
      const r = await fetch(API_BASE + '/ew/places/' + place.id + '/events', { headers: { 'Authorization': 'Bearer ' + token } });

        const data = await r.json();

  const HazardDrawer = () => {
    if (!drawerData) return null;

        <div className="modal-overlay" onClick={() => setDrawerData(null)} />
        <div className="modal-drawer">
          <div className="px-4 pt-4 pb-2 border-b border-slate-700/40 flex items-start justify-between">
            <div className="flex-1 min-w-0 pr-2">
              <h2 className="text-2xl font-bold text-white truncate">{place.name}</h2>
              <p className="text-teal-300 text-base">
                {Number(place.lat).toFixed(3)}, {Number(place.lng).toFixed(3)} · {place.radius_mi} mi radius
              </p>

            <button onClick={() => setDrawerData(null)} className="text-gray-200 hover:text-white text-2xl font-bold">X</button>

          <div className="px-4 py-3">

                <span className="block text-center text-teal-300 text-sm py-1 bg-slate-900/70">Tap to enlarge</span>
              </button>
            )}
            {!drawerLoading && events.length === 0 && (
              <div className="py-6 text-center">
                <p className="text-3xl mb-2">✓</p>

            {!drawerLoading && events.length > 0 && (

                {events.map(ev => {

                  return (
                    <div key={ev.id} className="rounded-xl overflow-hidden border" style={{ borderColor: sty.border, backgroundColor: sty.cardBg }}>
                      <div className="px-3 py-2 flex items-center gap-2" style={{ backgroundColor: sty.headerBg }}>
                        <span className="text-2xl">{hazardIcon(ev.hazard_type)}</span>
                        <span className="text-white font-bold text-lg uppercase tracking-wide">{sty.label}</span>
                        <span className="ml-auto text-white/80 text-xs uppercase">{ev.source}</span>

                  <div className="p-3 bg-black/30 rounded-xl text-center">
                    <p className="text-gray-200 text-xl mb-2">Trying it out? You can save up to {AUTH_GATE_CONFIG.freeAnonLimit} places without an account.</p>
                    <p className="text-gray-400 text-lg">Sign up for unlimited saves and 12-hour earth alerts.</p>
                  </div>
                  <button onClick={() => gate.openSignup()} className="w-full py-4 bg-teal-700 hover:bg-slate-800 text-white rounded-xl text-2xl font-bold">Sign Up</button>
                  <button onClick={() => gate.openSignin()} className="w-full py-3 bg-gray-800 border border-gray-600 text-gray-100 rounded-xl text-xl">Already have an account? Sign In</button>
                </>
              )}
            </div>
            <p className="text-white/30 text-center text-sm pb-4">v{APP_VERSION}</p>
          </div>
        )}

      </div>

      {/* ── Bottom nav ───────────────────────────────────────────────────── */}
      <div style={{ position: 'fixed', bottom: 0, left: 0, right: 0, backgroundColor: 'rgba(10,10,10,0.95)', backdropFilter: 'blur(8px)', borderTop: '1px solid #1e3a4a', padding: '0.5rem 1rem', paddingBottom: 'max(0.5rem, env(safe-area-inset-bottom))' }}>
        <div className="flex justify-around max-w-sm mx-auto">
          <button onClick={() => setPage('search')} className={'flex flex-col items-center gap-0.5 px-1 py-1 ' + (page === 'search' ? 'text-teal-400' : 'text-gray-200')}>
            <SearchIcon /><span className="text-xl font-medium">Search</span>
          </button>
          <button onClick={() => setPage('watchlist')} className={'flex flex-col items-center gap-0.5 px-1 py-1 ' + (page === 'watchlist' ? 'text-teal-400' : 'text-gray-200')}>
            <HeartIcon /><span className="text-xl font-medium">Watchlist</span>
          </button>
          <button onClick={() => setPage('places')} className={'flex flex-col items-center gap-0.5 px-1 py-1 ' + (page === 'places' ? 'text-teal-400' : 'text-gray-200')}>
            <svg className="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
            <span className="text-xl font-medium">My Places</span>
          </button>
          <button onClick={() => setPage('info')} className={'flex flex-col items-center gap-0.5 px-1 py-1 ' + (page === 'info' ? 'text-teal-400' : 'text-gray-200')}>
            <InfoIcon /><span className="text-xl font-medium">Info</span>
          </button>
          <button onClick={() => setPage('alerts')} className={'flex flex-col items-center gap-0.5 px-1 py-1 relative ' + (page === 'alerts' ? 'text-teal-400' : 'text-gray-200')}>
            <BellIcon red={unreadCount > 0} />
            {unreadCount > 0 && <span className="absolute top-0 right-1 bg-teal-600 text-white text-xl font-bold rounded-full w-4 h-4 flex items-center justify-center">{unreadCount > 9 ? '9+' : unreadCount}</span>}
            <span className="text-xl font-medium" style={unreadCount > 0 ? {color:'#0d9488'} : {}}>Alerts</span>
          </button>
        </div>
        <p className="text-center text-gray-600 text-xs mt-1" style={{display: page === 'search' ? 'none' : 'block'}}>app v{APP_VERSION} | api v{apiVersion}</p>
      </div>
    </PageWrapper>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
